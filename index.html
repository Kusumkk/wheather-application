<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font to match 'montserrat' in CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrap">
    <header>
      <input
        type="text"
        class="search-box"
        placeholder="Search for a city..."
      />
    </header>

    <main>
      <section class="location">
        <div class="city">Search a city</div>
        <div class="date"></div>
      </section>

      <section class="current">
        <div class="temp">--<span>°c</span></div>
        <div class="weather">Weather</div>
        <div class="hi-low">--°c / --°c</div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
